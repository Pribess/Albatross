name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and build
        run: bun run check

      - name: Publish built JS to Release asset
        uses: ncipollo/release-action@v1
        with:
          tag: build-latest
          name: Latest Build
          body: Automated build artifact from main.
          allowUpdates: true
          makeLatest: true
          replacesArtifacts: true
          artifacts: dist/main.js
